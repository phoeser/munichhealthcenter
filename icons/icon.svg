<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f7fbf9"/>
      <stop offset="100%" stop-color="#e8f1ec"/>
    </linearGradient>
    <linearGradient id="mark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2f8b6a"/>
      <stop offset="100%" stop-color="#4a7a8a"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6"/>
      <feOffset dx="0" dy="4" result="offsetblur"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.22"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Hintergrund mit sanft gerundeten Ecken (iOS/Android machen Masking selbst) -->
  <rect x="0" y="0" width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <!-- Logo 2× skaliert und zentriert (Viewport des Originallogos ist 32×32) -->
  <g transform="translate(96 96) scale(10)" filter="url(#softShadow)">
    <path fill="url(#mark)" d="M16 2c3 4 7 6 7 12 0 5-3 8-7 8s-7-3-7-8c0-6 4-8 7-12zm0 22c4.5 0 8-3.5 8-8h2c0 5.5-4.5 10-10 10S6 21.5 6 16h2c0 4.5 3.5 8 8 8z"/>
  </g>
</svg>